# BRERC public dashboard — full local/dev stack.
#
#   db       PostgreSQL 16 + PostGIS (dev database from the SYNTHETIC seed)
#   martin   vector tile server (reads the public_occurrences gate only)
#   api      read-only FastAPI (public tier; internal routes NOT mounted here)
#   web      the built React front end (nginx)
#   proxy    Caddy — serves everything SAME-ORIGIN on :8080 (/, /api, /tiles)
#
# The optional `api-internal` service (profile: internal) serves the INTERNAL
# data-quality API. It is bound to localhost and is deliberately NOT behind the
# public proxy, so the internal tier can never be reached through the public URL.
#
# Quick start:  cp .env.example .env  →  make up  →  make db-migrate  →  make db-seed
# Dev→prod (Decisions_Log D-005): change PUBLIC_DATABASE_URL only.

name: brerc-public-dashboard

services:
  db:
    image: postgis/postgis:16-3.4 # PostgreSQL 16 + PostGIS 3.4 (16-3.5/3.6 also fine)
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-brerc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
      POSTGRES_DB: ${POSTGRES_DB:-brerc}
    volumes:
      - pgdata:/var/lib/postgresql/data
      # The repo is mounted read-only so `make db-migrate/db-seed` can psql -f it.
      - ./:/repo:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-brerc} -d ${POSTGRES_DB:-brerc}"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  martin:
    # Pin to a tested release for production (e.g. a specific 0.x/1.x tag);
    # `latest` is used here for a friction-free first run.
    image: ghcr.io/maplibre/martin:latest
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Martin connects as the READ-ONLY role — it cannot see precise data.
      DATABASE_URL: postgresql://brerc_readonly:${BRERC_READONLY_PASSWORD:-change_me}@db:5432/${POSTGRES_DB:-brerc}
    volumes:
      - ./tiles/martin-config.yaml:/config/martin.yaml:ro
    command: ["--config", "/config/martin.yaml"]
    expose:
      - "3000"
    ports:
      - "${MARTIN_PORT:-3000}:3000" # optional direct access; the proxy uses the internal network
    restart: unless-stopped

  api:
    build: ./api
    depends_on:
      db:
        condition: service_healthy
    environment:
      PUBLIC_DATABASE_URL: ${PUBLIC_DATABASE_URL:-postgresql://brerc_readonly:change_me@db:5432/brerc}
      # Behind the proxy the API is mounted at /api; this keeps the OpenAPI docs correct.
      API_ROOT_PATH: /api
      # Same-origin in production ⇒ no CORS needed. (Dev uses the Vite proxy instead.)
      API_CORS_ORIGINS: ${API_CORS_ORIGINS:-}
      API_MAX_ROWS: ${API_MAX_ROWS:-5000}
      API_STATEMENT_TIMEOUT_MS: ${API_STATEMENT_TIMEOUT_MS:-5000}
      SPECIES_INFO_USER_AGENT: ${SPECIES_INFO_USER_AGENT:-BRERC-Dashboard/0.1 (+https://www.brerc.org.uk)}
      SPECIES_INFO_CACHE_TTL_DAYS: ${SPECIES_INFO_CACHE_TTL_DAYS:-30}
      # NOTE: INTERNAL_* is intentionally NOT set here, so the internal routes are
      # never mounted on the public API and can never be reached via the proxy.
    expose:
      - "8000"
    restart: unless-stopped

  web:
    build: ./web
    expose:
      - "80"
    restart: unless-stopped

  proxy:
    image: caddy:2
    depends_on:
      - web
      - api
      - martin
    volumes:
      - ./proxy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    ports:
      - "${PROXY_PORT:-8080}:8080"
    restart: unless-stopped

  # --- INTERNAL tier (opt-in): `docker compose --profile internal up -d` --------
  # Serves the /internal data-quality API. Bound to localhost, NOT proxied.
  api-internal:
    profiles: ["internal"]
    build: ./api
    depends_on:
      db:
        condition: service_healthy
    environment:
      PUBLIC_DATABASE_URL: ${PUBLIC_DATABASE_URL:-postgresql://brerc_readonly:change_me@db:5432/brerc}
      INTERNAL_ENABLED: "true"
      INTERNAL_DATABASE_URL: ${INTERNAL_DATABASE_URL:-postgresql://brerc_internal_ro:change_me@db:5432/brerc}
      INTERNAL_BASIC_AUTH_USER: ${INTERNAL_BASIC_AUTH_USER:-staff}
      INTERNAL_BASIC_AUTH_PASSWORD: ${INTERNAL_BASIC_AUTH_PASSWORD:-change_me}
    ports:
      # Localhost only — reachable by internal staff tooling, never the public.
      - "127.0.0.1:${INTERNAL_API_PORT:-8001}:8000"
    restart: unless-stopped

volumes:
  pgdata:
  caddy_data:
  caddy_config:
