<!doctype html>
<!--
  The document language is set explicitly (WCAG 3.1.1 Language of Page) and the
  <title> matches the embedding <iframe title> so screen-reader users get a
  coherent name (WCAG 2.4.2 / 4.1.2). Keep both in step if you rename the app.
-->
<html lang="en-GB">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Interactive, accessible species-distribution maps for the West of England, from the Bristol Regional Environmental Records Centre (BRERC)."
    />
    <title>BRERC species-distribution dashboard</title>
  </head>
  <body>
    <!-- React mounts here. The app renders a skip link, header, main, and
         complementary panels as landmarks. -->
    <div id="root"></div>
    <noscript>
      This dashboard needs JavaScript to draw the interactive map. The same
      records are available as a data table and via the BRERC website.
    </noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
