# nginx config for the static front end (served behind the Caddy proxy).
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # Hashed build assets can be cached hard.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Single-page app: fall back to index.html.
    location / {
        try_files $uri /index.html;
    }
}
