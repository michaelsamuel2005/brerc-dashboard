name: CI

# Quality gates for every push and pull request. Four independent jobs:
#   backend   — ruff + pytest (+ advisory mypy) + SQL grammar validation
#   frontend  — eslint (incl. jsx-a11y) + tsc + vitest (incl. axe) + build
#   database  — runs the migrations, seed, and the fail-closed GATE test against
#               real PostGIS, plus the internal data-quality test
# The database job is the most important: it proves the sensitive-species gate
# holds on an actual database, not just in review.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (API + SQL)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install API + dev tools
        run: |
          python -m pip install --upgrade pip
          pip install ./api[dev] pglast
      - name: Lint (ruff)
        run: ruff check api
      - name: Unit tests (pytest)
        working-directory: api
        run: pytest -q
      - name: Validate SQL grammar (pglast)
        run: python scripts/validate_sql.py
      - name: Type check (mypy, advisory)
        # Advisory: the mypy + pydantic-plugin combination is version-sensitive;
        # failures here should be reviewed but do not block the build.
        continue-on-error: true
        working-directory: api
        run: mypy app

  frontend:
    name: Frontend (web)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install
        run: npm ci
      - name: Lint (eslint + jsx-a11y)
        run: npm run lint
      - name: Type check (tsc)
        run: npm run typecheck
      - name: Unit + accessibility tests (vitest + jest-axe)
        run: npm run test
      - name: Build
        run: npm run build

  database:
    name: Database gate (real PostGIS)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: brerc
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: brerc
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U brerc -d brerc"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      PGHOST: localhost
      PGPORT: "5432"
      PGUSER: brerc
      PGPASSWORD: postgres
      PGDATABASE: brerc
    steps:
      - uses: actions/checkout@v4
      - name: Install psql client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: Apply migrations
        run: |
          for f in db/migrations/*.sql; do
            echo "-- $f"
            psql -v ON_ERROR_STOP=1 -v readonly_password=ci_readonly_pw -f "$f"
          done
      - name: Seed synthetic data
        run: |
          psql -v ON_ERROR_STOP=1 -f db/seed/sensitive_species_demo.sql
          psql -v ON_ERROR_STOP=1 -f db/seed/seed_synthetic.sql
      - name: Run the fail-closed generalisation GATE test
        run: psql -v ON_ERROR_STOP=1 -f db/tests/test_generalisation_gate.sql
      - name: Apply internal views + demo anomalies
        run: |
          for f in db/internal/*.sql; do
            psql -v ON_ERROR_STOP=1 -v internal_password=ci_internal_pw -f "$f"
          done
          psql -v ON_ERROR_STOP=1 -f db/seed/internal_dq_demo.sql
      - name: Run the internal data-quality test
        run: psql -v ON_ERROR_STOP=1 -f db/tests/test_data_quality.sql
