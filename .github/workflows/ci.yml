# Continuous Integration for the BRERC backend API (B0).
#
# GitHub runs this automatically on every push and pull request. It installs the
# API, stands up a throwaway PostGIS database loaded with the B0 sample data, and
# runs the test suite — so the contract-shape tests AND the safety-boundary tests
# (no recorder names / no precise coords / sensitive rows blurred) are checked on
# every change. Nothing here touches real BRERC data; it uses the invented sample
# rows in db/b0_staging_setup.sql only.
#
# You don't run this file yourself — push your branch and watch the "Actions" tab
# on GitHub. A green tick means the tests passed.

name: CI

on:
  push:
  pull_request:

jobs:
  api-tests:
    name: API tests (with sample PostGIS database)
    runs-on: ubuntu-latest

    # Run every step from inside the api/ folder (that's where the app lives).
    defaults:
      run:
        working-directory: api

    # A disposable PostGIS database, created fresh for this run and thrown away
    # after. Nothing real ever lives here.
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: brerc_ui
        ports:
          - 5432:5432
        # Wait until the database is actually ready before the job starts.
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # The API and the tests read this. Same shape as your local .env, pointing
      # at the throwaway database above.
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/brerc_ui

    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Load the B0 sample database
        run: |
          psql "$DATABASE_URL" -c "CREATE EXTENSION IF NOT EXISTS postgis;"
          psql "$DATABASE_URL" -f ../db/b0_staging_setup.sql

      - name: Run the tests
        # Scoped to the API test suite (this backend workstream, B0/B6-B9).
        # The ETL pipeline (etl/, B1-B5) has its own tests; add them here once
        # they run standalone.
        run: python -m pytest tests -q
