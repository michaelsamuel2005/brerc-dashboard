name: Bug report
description: Something in the dashboard, API, tiles, or database isn't working.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. **Do not paste real BRERC data, credentials, or precise
        sensitive-species locations** into this issue — it is public.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you expect, and what did you get instead?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to …
        2. Filter by …
        3. See …
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Public dashboard (web)
        - API
        - Tiles / map
        - Database / migrations
        - Internal data-quality dashboard
        - Docs / other
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: browser + version, or "make up" local stack, commit SHA
  - type: checkboxes
    id: safety
    attributes:
      label: Safety confirmation
      options:
        - label: This report contains no real client data, secrets, or precise sensitive-species locations.
          required: true
