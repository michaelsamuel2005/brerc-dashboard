name: Feature request
description: Suggest an improvement to the dashboard or tooling.
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: The problem
      description: What need or gap is this solving? Who is it for (public visitor / BRERC staff)?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
    validations:
      required: true
  - type: checkboxes
    id: constraints
    attributes:
      label: Constraints this must respect
      description: Tick the ones relevant so reviewers can weigh them early.
      options:
        - label: Keeps the sensitive-species gate intact (server-side, fail-closed).
        - label: Keeps WCAG 2.2 AA (accessible, keyboard, contrast, non-map equivalent).
        - label: Read-only, no client-data egress, no secrets.
